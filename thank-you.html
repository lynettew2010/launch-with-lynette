<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Launch with Lynette</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      font-family:Inter,sans-serif;
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(1200px 700px at 10% 10%, rgba(255,74,165,.10), transparent 55%),
        radial-gradient(1000px 700px at 85% 15%, rgba(138,99,255,.10), transparent 50%),
        linear-gradient(180deg,#11111a 0%,#1a1a28 100%);
      padding:24px;
    }
    .card{
      max-width:760px;
      width:100%;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      border-radius:28px;
      padding:42px;
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.28);
    }
    h1{
      font-family:"Space Grotesk",sans-serif;
      font-size:clamp(2rem,5vw,3.4rem);
      line-height:1.05;
      letter-spacing:-.04em;
      margin:0 0 14px;
    }
    p{
      color:rgba(255,255,255,.78);
      font-size:1.05rem;
      margin:0 0 14px;
    }
    a{
      display:inline-block;
      margin-top:18px;
      padding:14px 24px;
      border-radius:999px;
      background:linear-gradient(135deg,#ff4aa5,#8a63ff);
      color:#fff;
      text-decoration:none;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank you — your review request is in.</h1>
    <p>I received your submission and will take a look at what you sent over.</p>
    <p>You can expect a follow-up by email after I review your page, funnel, or program structure.</p>
    <a href="index.html">Back to Site</a>
  </div>
</body>
</html>
