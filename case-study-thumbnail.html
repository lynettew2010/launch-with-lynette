<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiffany M. Case Study Thumbnail</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* LINKEDIN FEATURED THUMBNAIL SIZE */
        .thumbnail {
            width: 1200px;
            height: 627px;
            background: #0f0f1a;
            position: relative;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* Gradient orbs (subtle background) */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: rgba(255, 74, 165, 0.15);
            top: -200px;
            left: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(138, 99, 255, 0.12);
            bottom: -150px;
            right: -100px;
        }

        /* Content container */
        .content {
            position: relative;
            z-index: 10;
            padding: 50px 60px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        /* Brand name with gradient - EXACTLY like website */
        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff4aa5 0%, #8a63ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        /* Case study label */
        .case-label {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #ff4aa5;
            border: 2px solid #ff4aa5;
            padding: 8px 20px;
            border-radius: 30px;
        }

        /* Main title area */
        .title-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .main-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 72px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -0.03em;
        }

        .subtitle {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
        }

        /* Results boxes */
        .results {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .result-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px 20px;
            text-align: center;
        }

        .result-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .result-title {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .result-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Footer */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff4aa5 0%, #8a63ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .cta {
            font-size: 18px;
            font-weight: 600;
            color: #8a63ff;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="thumbnail">
        <!-- Background orbs -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <!-- Content -->
        <div class="content">
            <!-- Header -->
            <div class="header">
                <div class="brand">Launch with Lynette</div>
                <div class="case-label">Case Study</div>
            </div>

            <!-- Title -->
            <div class="title-area">
                <h1 class="main-title">Tiffany M.<br>Mentorship Automation</h1>
                <p class="subtitle">Automated applicant scoring • Gmail alerts • Source tracking</p>
            </div>

            <!-- Results -->
            <div class="results">
                <div class="result-box">
                    <div class="result-icon">⚡</div>
                    <div class="result-title">Prioritized</div>
                    <div class="result-desc">Applicant Ranking</div>
                </div>
                <div class="result-box">
                    <div class="result-icon">🎯</div>
                    <div class="result-title">Tracked</div>
                    <div class="result-desc">Lead Sources</div>
                </div>
                <div class="result-box">
                    <div class="result-icon">⏱️</div>
                    <div class="result-title">Streamlined</div>
                    <div class="result-desc">Manual Review</div>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                <div class="footer-brand">Launch with Lynette</div>
                <div class="cta">Free Funnel Review →</div>
            </div>
        </div>
    </div>
</body>
</html>
